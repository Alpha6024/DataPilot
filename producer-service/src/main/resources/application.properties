spring.application.name=producer-service
server.port=8080

ollama.base-url=${OLLAMA_BASE_URL:http://localhost:11434}
ollama.embedding.model=nomic-embed-text
ollama.chat.model=qwen3

qdrant.host=${QDRANT_HOST:localhost}
qdrant.port=${QDRANT_PORT:6334}

spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.acks=1
spring.kafka.producer.retries=3
spring.kafka.producer.properties.delivery.timeout.ms=300000
spring.kafka.producer.properties.request.timeout.ms=60000

spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
upload.dir=uploads/
